<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Interface v5</title>
    <style>
        :root {
            --bg: #000000;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.12);
            --text: #ffffff;
            --sub: #86868b;
            --accent: #4cd964;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: var(--bg); color: var(--text); 
            font-family: -apple-system, sans-serif; 
            overflow: hidden; 
        }

        #splash {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 1s ease, visibility 1s;
        }
        
        .intro-content { 
            display: flex; flex-direction: column; align-items: center; 
            text-align: center;
        }

        .gh-big {
            width: 60px; height: 60px; fill: #fff; margin-bottom: 20px;
            animation: pulse 2s infinite ease-in-out;
        }

        .intro-top { font-size: 28px; font-weight: 600; letter-spacing: 0.2em; margin-bottom: 5px; }
        .intro-bottom { font-size: 12px; color: var(--sub); letter-spacing: 0.3em; text-transform: uppercase; }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(0.95); }
            50% { opacity: 1; transform: scale(1); }
        }

        #main { 
            display: flex; flex-direction: column; height: 100vh; 
            opacity: 0; transform: translateY(10px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        header {
            height: 70px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 30px; border-bottom: 1px solid var(--border);
        }

        #e {
            flex: 1; margin: 20px; background: var(--glass); border: 1px solid var(--border);
            border-radius: 16px; padding: 30px; color: #fff; outline: none;
            resize: none; font-family: "SF Mono", monospace; font-size: 15px; line-height: 1.5;
        }

        #c {
            position: fixed; bottom: 90px; right: 30px; width: 320px; max-height: 350px;
            background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 16px; 
            display: none; flex-direction: column; padding: 15px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            overflow-y: auto; z-index: 100;
        }

        .msg { padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 12px; color: var(--sub); }
        .msg span { color: var(--accent); font-weight: bold; margin-right: 8px; }

        footer { height: 50px; padding: 0 30px; display: flex; align-items: center; justify-content: space-between; font-size: 11px; color: var(--sub); border-top: 1px solid var(--border); }
        .gh { color: var(--sub); text-decoration: none; border: 1px solid var(--border); padding: 4px 10px; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="intro-content">
            <svg class="gh-big" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
            <div class="intro-top">COMPILATORS</div>
            <div class="intro-bottom">v5 Terminal</div>
        </div>
    </div>

    <div id="main">
        <header>
            <div id="flag" style="color: #ff3b30; font-size: 11px; font-weight: 700; letter-spacing: 1px;">OFFLINE</div>
            <div style="font-size: 11px; color: var(--sub)" id="status">UNAUTHORIZED</div>
        </header>
        
        <textarea id="e" spellcheck="false"># Terminal Initialized...
# Use sys.access('Fontash1337') to unlock stream.
# Press Ctrl + Enter to execute.</textarea>

        <footer>
            <a href="https://github.com" class="gh">Source</a>
            <span>2026 &copy; CORE_SYSTEM</span>
        </footer>
    </div>

    <div id="c"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        (function() {
            setTimeout(() => {
                const s = document.getElementById('splash');
                const m = document.getElementById('main');
                s.style.opacity = '0';
                setTimeout(() => { 
                    s.style.visibility = 'hidden'; 
                    m.style.opacity = '1';
                    m.style.transform = 'translateY(0)';
                }, 1000);
            }, 2500);

            const _k = "shield_v5";
            const _d = (s) => s.match(/.{1,2}/g).map((c, i) => String.fromCharCode(parseInt(c, 16) ^ _k.charCodeAt(i % _k.length))).join('');
            
            const config = {
                apiKey: _d("1c171e1620021c174b0d0c040d16010024040b1959111301011a051d4b00090f1d18190514101d04"),
                databaseURL: _d("14171a1215444b4b1a110b141a0b181a05180f4f1a111c15031b014f0b1713061a1b0c14114f1a110a")
            };

            firebase.initializeApp(config);
            const auth = firebase.auth();
            const db = firebase.database();

            document.getElementById('e').onkeydown = async function(ev) {
                if (ev.key === 'Enter' && ev.ctrlKey) {
                    const lines = this.value.split('\n');
                    const cmd = lines[lines.length - 1].trim();

                    if (cmd.includes("sys.access('Fontash1337')")) {
                        try {
                            await auth.signInAnonymously();
                            document.getElementById('flag').style.color = "var(--accent)";
                            document.getElementById('flag').innerText = "ONLINE";
                            document.getElementById('status').innerText = "AUTHORIZED";
                            document.getElementById('c').style.display = 'flex';
                            this.value += "\n# ACCESS GRANTED. Stream connected.";
                            
                            db.ref('stream/v5').limitToLast(15).on('child_added', (snap) => {
                                const data = snap.val();
                                const box = document.getElementById('c');
                                box.innerHTML += `<div class="msg"><span>[${snap.key.slice(-4)}]</span>${data.v}</div>`;
                                box.scrollTop = box.scrollHeight;
                            });
                        } catch (e) {
                            this.value += "\n# ERROR: Connection failed.";
                        }
                    } 
                    else if (cmd.startsWith("sys.log('")) {
                        const msg = cmd.split("'")[1];
                        if (auth.currentUser) {
                            db.ref('stream/v5').push({ v: msg, ts: Date.now() });
                            this.value += `\n# SENT: ${msg}`;
                        } else {
                            this.value += "\n# ERROR: Unauthorized.";
                        }
                    }
                }
            };
        })();
    </script>
</body>
</html>
