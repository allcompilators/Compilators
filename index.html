<!DOCTYPE html>

        #hdr { height: 40px; background: var(--p); border-bottom: 1px solid var(--brd); display: flex; align-items: center; padding: 0 20px; z-index: 10; }
        .stat { font-size: 10px; font-family: monospace; color: var(--s); text-transform: uppercase; letter-spacing: 1px; }
        .tag { color: #888; font-weight: bold; margin-left: 10px; }

        #editor-container { flex: 1; display: flex; position: relative; background: var(--b); }
        #side { width: 45px; background: var(--p); border-right: 1px solid var(--brd); display: flex; flex-direction: column; align-items: center; padding-top: 20px; gap: 15px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #1a1a1a; }

        #e { flex: 1; background: transparent; color: #ccc; padding: 25px; border: none; outline: none; resize: none; font-family: "JetBrains Mono", "SF Mono", monospace; font-size: 13px; line-height: 1.5; }
        
        #c { display: none; position: fixed; inset: 0; background: rgba(5,5,5,0.99); z-index: 200; padding: 40px; overflow-y: auto; font-family: monospace; }
        .m_r { margin-bottom: 10px; border-left: 1px solid #222; padding-left: 15px; color: #aaa; }
        .u_n { color: #fff; margin-right: 10px; }

        #ftr { height: 32px; background: var(--p); border-top: 1px solid var(--brd); display: flex; align-items: center; padding: 0 15px; justify-content: space-between; font-size: 11px; color: var(--s); }
        .gh { color: #888; text-decoration: none; transition: 0.2s; }
        .gh:hover { color: #fff; }
        .conv { font-style: italic; opacity: 0.7; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="logo">INITIALIZING KERNEL...</div>
    </div>

    <div id="main">
        <div id="hdr">
            <div class="stat">System: <span class="tag">ACTIVE 0x4421</span></div>
            <div style="margin-left:auto" class="stat">Compiler: <span id="comp-stat">Ready</span></div>
        </div>
        <div id="editor-container">
            <div id="side"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
            <textarea id="e" spellcheck="false"># System core v4.0.5
import sys
import time

def boot_sequence():
    return "STATUS_OK"

print(boot_sequence())</textarea>
        </div>
        <div id="ftr">
            <div>
                <a href="https://github.com/compilators" class="gh" target="_blank">GitHub: compilators</a>
            </div>
            <div class="conv">everything for your convenience</div>
        </div>
    </div>

    <div id="c"></div>

</body>
</html>
