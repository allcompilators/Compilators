<!DOCTYPE html>

        .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--brd); transition: 0.3s; }
        .dot:hover { background: var(--s); }

        #e { flex: 1; background: transparent; color: #e1e1e6; padding: 35px; border: none; outline: none; resize: none; font-family: "SF Mono", "JetBrains Mono", monospace; font-size: 14px; line-height: 1.6; letter-spacing: -0.2px; }
        
        #c { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); backdrop-filter: blur(30px); z-index: 200; padding: 60px; overflow-y: auto; }
        .m_r { margin-bottom: 12px; padding: 12px 18px; background: var(--glass); border-radius: 14px; border: 0.5px solid var(--brd); font-family: "SF Mono", monospace; font-size: 13px; color: #d1d1d6; width: fit-content; max-width: 80%; }
        .u_n { color: #fff; margin-right: 12px; font-weight: 700; opacity: 0.5; font-size: 11px; }

        #ftr { height: 40px; background: rgba(18, 18, 23, 0.8); backdrop-filter: blur(20px); border-top: 0.5px solid var(--brd); display: flex; align-items: center; padding: 0 24px; justify-content: space-between; font-size: 12px; color: var(--s); }
        .gh { color: var(--t); text-decoration: none; font-weight: 500; transition: opacity 0.2s; }
        .gh:hover { opacity: 0.7; }
        .conv { font-weight: 400; opacity: 0.5; letter-spacing: -0.1px; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="logo-wrap">
            <div class="logo">GitHub Compilators</div>
            <div class="sub-logo">everything for your convenience</div>
        </div>
    </div>

        <div id="editor-container">

print(system_check())</textarea>
        </div>
        <div id="ftr">

</body>
</html>
